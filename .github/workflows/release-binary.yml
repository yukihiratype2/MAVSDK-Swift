name: Release Binary

on:
  push:
    tags:
      - "v*"

jobs:
  release-binary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Validate binary archive
        run: test -f Binaries/mavsdk_server.xcframework.zip
      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Binaries/mavsdk_server.xcframework.zip
